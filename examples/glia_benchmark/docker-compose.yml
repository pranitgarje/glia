version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Glia Symmetric Comparative Benchmark — Infrastructure
# Spins up all data tier components for the dual-track RAG benchmark.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  glia_net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  redis_data:

services:

  # ── Redis Stack (Glia cache + RediSearch index) ───────────────────────────
  redis:
    image: redis/redis-stack:7.2.0-v9
    container_name: glia_redis
    ports:
      - "6379:6379"    # Redis
      - "8001:8001"    # RedisInsight UI
    volumes:
      - redis_data:/data
    environment:
      REDIS_ARGS: "--save 60 1 --loglevel warning"
    networks:
      - glia_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PostgreSQL (Relational tier) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: glia_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: glia
      POSTGRES_PASSWORD: gliapass
      POSTGRES_DB: benchmark
    networks:
      - glia_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glia -d benchmark"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Neo4j (Graph tier) ────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: glia_neo4j
    ports:
      - "7474:7474"    # HTTP / Browser
      - "7687:7687"    # Bolt
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/gliapass123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    networks:
      - glia_net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── Qdrant (Vector tier) ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: glia_qdrant
    ports:
      - "6333:6333"    # REST
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - glia_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Benchmark Dashboard (Flask SSE) ───────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: glia_dashboard
    ports:
      - "5050:5050"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
    networks:
      - glia_net
